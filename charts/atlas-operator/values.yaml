# Default values for atlas-operator.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: arigaio/atlas-operator
  pullPolicy: IfNotPresent
  tag: ""

rbac:
  create: true
  aggregateClusterRoles: false

crds:
  # CustomResourceDefinitions are cluster-scoped and shared by every release.
  # When installing multiple releases of this chart in the same cluster (for
  # example, one per team, each scoped with `labelSelector`), only one release
  # should own the CRDs. Set this to false on the additional releases to avoid
  # "invalid ownership metadata" conflicts.
  create: true

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  labels: {}
  name: ""

podAnnotations: {}

podLabels: {}

podSecurityContext:
  runAsNonRoot: true

containerSecurityContext:
  runAsUser: 65532
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

resources: {}

nodeSelector: {}

priorityClassName: ""

tolerations: []

affinity: {}

# By default, the operator will recreate devdb pods after migration
# Set this to true to keep the devdb pods around.
prewarmDevDB: true

# Enable this to allow custom project configuration
# Warning: This setting enables users to use the `external` and `sql` data sources
# which can be used to execute arbitrary commands and queries. Use with caution.
allowCustomConfig: false

# Restrict the operator to only manage AtlasSchema and AtlasMigration resources
# matching these label selector requirements (ANDed together). Leave empty to
# manage all resources. This is useful when running multiple operator instances
# in the same namespace, each handling specific resources.
# e.g. labelSelector: ["app=foo", "env in (prod,staging)"]
labelSelector: []

# Restrict the operator to only watch AtlasSchema and AtlasMigration resources
# in these namespaces. Leave empty to watch all namespaces (cluster scope).
# e.g. watchNamespaces: ["team-a", "team-b"]
watchNamespaces: []

# -- Additional environment variables to set
extraEnvs: []
# extraEnvs:
#   - name: FOO
#     valueFrom:
#       secretKeyRef:
#         key: FOO
#         name: secret-resource
#   - name: BAR
#     valueFrom:
#      configMapKeyRef:
#        key: BAR
#        name: config-map-resource

# Persistent volume configuration
persistence:
  enabled: false
  # Storage class name for the PVC
  # storageClassName: ""
  # Access modes for the PVC
  accessModes:
    - ReadWriteOnce
  # Size of the persistent volume
  size: 1Gi
  # Mount path inside the container
  mountPath: /data
  # fsGroup to set on the pod security context, ensuring the volume is writable
  # by the container's user (65532)
  fsGroup: 65532
  # Annotations for the PVC
  annotations: {}

extraVolumes: []
# extraVolumes:
#   - name: extra-volume
#     secret:
#       secretName: extra-volume-secret

extraVolumeMounts: []
# extraVolumeMounts:
#   - name: extra-volume
#     mountPath: /extra-volume
#     readOnly: true

