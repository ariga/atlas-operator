name: CI - Helm Test

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - "master"

jobs:
  helm-test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/v2.19.0/skaffold-linux-amd64 && \
          sudo install skaffold /usr/local/bin/
      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v4.1.4
      - name: Run e2e tests with Operator
        run: |
          make test-e2e \
            ATLAS_TOKEN=${{ secrets.ATLAS_TOKEN }} \
            KIND_CLUSTER=chart-testing \
            TEST_RUN='(schema|migration)-mysql'
        env:
          SKAFFOLD_PROFILE: helm
      - name: test env vars
        run: |
          helm template atlas-operator charts/atlas-operator \
            --set-json=extraEnvs='[{"name":"NORMAL_ENV","value":"value"}]' | grep NORMAL_ENV
