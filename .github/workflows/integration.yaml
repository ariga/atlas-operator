name: Integration Tests
on:
  push:
    branches:
      - master
  pull_request:
jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
      - name: Install Atlas CLI
        uses: ariga/setup-atlas@50e8000b32f475818655b84116e65a9a7c85cf10 # master
      - name: Generate
        run: |
          make cli-gen
      - name: Run Go mod tidy
        run: go mod tidy
      - name: Verify generated files are checked in properly
        run: |
          status=$(git status --porcelain)
          if [ -n "$status" ]; then
            echo "you need to run 'make cli-gen' and commit the changes"
            echo "$status"
            exit 1
          fi
      - name: Run tests
        run: |
          make test
  e2e:
    runs-on: ubuntu-latest
    needs: [unit]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: "go.mod"
      - name: Create k8s Kind Cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
      - name: Install Skaffold
        run: |
          curl -Lo skaffold https://storage.googleapis.com/skaffold/releases/v2.19.0/skaffold-linux-amd64 && \
          sudo install skaffold /usr/local/bin/
      - name: Setup Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v4.1.4
      - name: Run e2e tests
        run: |
          make test-e2e \
            ATLAS_TOKEN=${{ secrets.ATLAS_TOKEN }} \
            KIND_CLUSTER=chart-testing
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: 'logs-${{ github.run_id }}-${{ github.run_attempt }}'
          path: test/e2e/logs